# Favicon & manifest CDN redirect — Forge nginx config
#
# Paste this block into the Forge site nginx config (Site → Edit Nginx Configuration)
# INSIDE the server {} block, BEFORE the existing "location / {}" block.
#
# Effect: these paths bypass static-file serving and hit Laravel, which 301-redirects
# each request to the DO Spaces CDN asset. After the first browser visit the 301 is
# cached permanently — subsequent requests go straight to the CDN.

location ~ ^/(favicon\.ico|favicon\.png|favicon-16x16\.png|favicon-32x32\.png|apple-touch-icon(-precomposed)?\.png|site\.webmanifest|ms-favicon\.png)$ {
    return 301 https://gemx.sfo3.digitaloceanspaces.com/assets$uri;
    access_log off;
    log_not_found off;
}
