name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run PHPUnit/Pest tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gem_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gem_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: gem_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_pgsql, intl, xml, json, gd, curl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache Node dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Cache Vite build
        id: vite-cache
        uses: actions/cache@v4
        with:
          path: public/build
          key: ${{ runner.os }}-vite-${{ hashFiles('package-lock.json', 'vite.config.js', 'resources/js/**', 'resources/css/**') }}
          restore-keys: ${{ runner.os }}-vite-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --optimize-autoloader

      - name: Install Node dependencies
        if: steps.vite-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build assets
        if: steps.vite-cache.outputs.cache-hit != 'true'
        run: npm run build

      - name: Ensure Vite manifest exists
        run: |
          if [ ! -f public/build/manifest.json ]; then
            mkdir -p public/build
            echo '{"resources/css/app.css":{"file":"assets/app.css","src":"resources/css/app.css","isEntry":true},"resources/js/app.js":{"file":"assets/app.js","src":"resources/js/app.js","isEntry":true}}' > public/build/manifest.json
          fi

      - name: Create environment file
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Setup storage directories
        run: |
          mkdir -p storage/logs storage/framework/{cache,sessions,views}
          chmod -R 775 storage bootstrap/cache

      - name: Run migrations
        run: php artisan migrate --force

      - name: Link storage
        run: php artisan storage:link

      - name: Optimize
        run: php artisan optimize

      - name: Run tests
        run: php artisan test

      - name: Trigger deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DEPLOY_HOOK: ${{ secrets.DEPLOY_HOOK }}
        run: |
          [ -n "$DEPLOY_HOOK" ] && curl -s -X POST "$DEPLOY_HOOK"
